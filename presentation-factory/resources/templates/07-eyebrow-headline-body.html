<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eyebrow Headline Body</title>
<link rel="stylesheet" href="../tokens/slalom.css">
<style>
  /* === TEMPLATE: 07-eyebrow-headline-body ===
     Small eyebrow, large italic-Lora headline, single body paragraph.
     Generous whitespace. The brand's signature slide. */
  .ehb-layout {
    padding: var(--pad-y) var(--pad-x);
    height: 100%;
    display: flex; flex-direction: column; justify-content: center;
    max-width: 1500px;
  }
  .ehb-layout .eyebrow { margin-bottom: var(--space-6); }
  .ehb-layout .title { font-size: 110px; line-height: 1.05; }
  .ehb-layout .body {
    font-size: 32px; line-height: 1.5;
    max-width: 38ch;
    margin-top: var(--space-8);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="gradient-strip"></div>
  <div class="ehb-layout">
    <span class="eyebrow" data-slot="eyebrow">OUR POV</span>
    <h1 class="title" data-slot="title">AI that drives <em>real impact</em>—not pilot fatigue</h1>
    <p class="body" data-slot="body">From strategy to implementation, the work that holds is the work that connects data, decisions, and the teams who own outcomes.</p>
  </div>
  <div class="footer">
    <img class="footer-logo" data-slot="logo" src="../assets/slalom-logo.svg" alt="Slalom">
    <span class="slide-number" data-slot="slide-number">05 / 24</span>
  </div>
</div>
</body>
</html>
