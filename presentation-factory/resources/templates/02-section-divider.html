<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Section Divider</title>
<link rel="stylesheet" href="../tokens/slalom.css">
<style>
  /* === TEMPLATE: 02-section-divider ===
     Major section opener. Numbered section eyebrow + italic-emphasis title.
     Smooth gradient field, left-aligned, dark-on-light or light-on-dark. */
  .slide { background: var(--color-bg-dark); color: var(--color-fg-inverse); }
  .gradient-field {
    position: absolute; inset: 0;
    background: var(--gradient-brand);
    z-index: 0;
  }
  .gradient-field::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg,
      rgba(0,10,37,0.55) 0%,
      rgba(0,10,37,0.25) 50%,
      rgba(0,10,37,0.05) 100%);
  }
  .section-content {
    position: relative; z-index: 1;
    padding: var(--pad-y) var(--pad-x);
    height: 100%;
    display: flex; flex-direction: column; justify-content: center;
    max-width: 1500px;
  }
  .section-number {
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: 240px;
    line-height: 0.85;
    color: rgba(255,255,255,0.18);
    letter-spacing: -0.04em;
    margin: 0 0 -80px;
  }
  .section-content .eyebrow {
    color: rgba(255,255,255,0.92);
    position: relative; z-index: 1;
    margin: 0 0 var(--space-6);
  }
  .section-content .title {
    font-size: 110px;
    color: var(--color-fg-inverse);
    position: relative; z-index: 1;
    text-shadow: 0 2px 12px rgba(0,10,37,0.2);
  }
  .section-footer {
    position: absolute;
    bottom: var(--space-8);
    left: var(--pad-x); right: var(--pad-x);
    display: flex; justify-content: space-between; align-items: center;
    color: rgba(255,255,255,0.78);
    font-size: var(--fs-footer);
    letter-spacing: 0.06em;
    z-index: 2;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="gradient-field"></div>
  <div class="section-content">
    <span class="section-number" data-slot="section-number" aria-hidden="true">01</span>
    <span class="eyebrow" data-slot="eyebrow">SECTION ONE</span>
    <h1 class="title" data-slot="title">The <em>problem</em> in three parts</h1>
  </div>
  <div class="section-footer">
    <span data-slot="deck-title">Working session — May 2026</span>
    <span class="slide-number" data-slot="slide-number">02 / 24</span>
  </div>
</div>
</body>
</html>
