<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Section Divider</title>
<link rel="stylesheet" href="../tokens/slalom.css">
<style>
  /* === TEMPLATE: 02-section-divider ===
     v0.2 — Same-family navy hero, no multi-color gradient.
     Section number is large and ghosted in the background. */
  .slide { background: var(--color-bg-dark); color: var(--color-fg-inverse); }
  .section-bg { position: absolute; inset: 0; z-index: 0; background: var(--gradient-hero-navy); }
  .section-bg::after {
    content: ''; position: absolute;
    bottom: -160px; left: -160px;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(12, 98, 251, 0.25) 0%, transparent 65%);
    pointer-events: none;
  }
  .section-content {
    position: relative; z-index: 1;
    padding: var(--pad-y) var(--pad-x);
    height: 100%;
    display: flex; flex-direction: column; justify-content: center;
    max-width: 1500px;
  }
  .section-number {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 600;
    font-size: 280px;
    line-height: 0.85;
    color: rgba(255,255,255,0.12);
    letter-spacing: -0.02em;
    margin: 0 0 -100px;
  }
  .section-content .section-kicker {
    color: rgba(255,255,255,0.92);
    position: relative; z-index: 1;
    margin: 0 0 var(--space-6);
  }
  .section-content .title {
    font-size: 110px;
    color: var(--color-fg-inverse);
    position: relative; z-index: 1;
  }
  .section-content .title em {
    color: var(--slalom-cyan);
  }
  .section-footer {
    position: absolute;
    bottom: var(--space-8);
    left: var(--pad-x); right: var(--pad-x);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-subheading);
    color: rgba(255,255,255,0.78);
    font-size: var(--fs-footer);
    letter-spacing: 0.06em;
    z-index: 2;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="section-bg"></div>
  <div class="gradient-strip"></div>
  <div class="section-content">
    <span class="section-number" data-slot="section-number" aria-hidden="true">01</span>
    <span class="section-kicker" data-slot="eyebrow">01 / Section</span>
    <h1 class="title" data-slot="title">The <em>problem</em> in three parts</h1>
  </div>
  <div class="section-footer">
    <span data-slot="deck-title">Working session — May 2026</span>
    <span class="slide-number" data-slot="slide-number">02 / 24</span>
  </div>
</div>
</body>
</html>
