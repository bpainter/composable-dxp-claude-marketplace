<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thank You</title>
<link rel="stylesheet" href="../tokens/slalom.css">
<style>
  /* === TEMPLATE: 04-thank-you ===
     v0.2 — Flat-ink background, subtle blue glow accent.
     Multi-color gradient kept as a thin strip only. */
  .slide { background: var(--color-bg-dark); color: var(--color-fg-inverse); }
  .ty-bg { position: absolute; inset: 0; z-index: 0; background: var(--gradient-hero-ink); }
  .ty-bg::after {
    content: ''; position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1200px; height: 1200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(12, 98, 251, 0.18) 0%, transparent 60%);
    pointer-events: none;
  }
  .thank-you-content {
    position: relative; z-index: 1;
    height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: var(--pad-y) var(--pad-x);
    text-align: center;
  }
  .thank-you-title {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 600;
    font-size: 180px;
    line-height: 1.0;
    letter-spacing: -0.01em;
    color: var(--color-fg-inverse);
    margin: 0;
  }
  .thank-you-title em {
    font-style: italic;
    font-weight: 600;
    color: var(--slalom-cyan);
  }
  .thank-you-sub {
    font-family: var(--font-subheading);
    font-weight: 700;
    font-size: 36px;
    line-height: var(--lh-heading);
    color: rgba(255,255,255,0.88);
    margin: var(--space-8) 0 0;
    max-width: 36ch;
    text-wrap: balance;
  }
  .thank-you-cta {
    display: inline-flex;
    align-items: center;
    gap: var(--space-3);
    margin-top: var(--space-12);
    padding: var(--space-5) var(--space-8);
    background: var(--color-fg-inverse);
    color: var(--color-fg);
    border-radius: var(--radius-pill);
    font-family: var(--font-subheading);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.02em;
    text-decoration: none;
  }
  .thank-you-cta::after { content: '→'; }
  .thank-you-footer {
    position: absolute;
    bottom: var(--space-8);
    left: var(--pad-x); right: var(--pad-x);
    display: flex; justify-content: space-between; align-items: center;
    color: rgba(255,255,255,0.78);
    font-family: var(--font-subheading);
    font-size: var(--fs-footer);
    letter-spacing: 0.06em;
    z-index: 2;
  }
  .thank-you-footer-logo {
    height: 48px;
    filter: brightness(0) invert(1);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="ty-bg"></div>
  <div class="gradient-strip"></div>
  <div class="thank-you-content">
    <h1 class="thank-you-title" data-slot="title">Let's solve <em>together</em>.</h1>
    <p class="thank-you-sub" data-slot="subtitle">Questions, reactions, what we should chase next.</p>
    <a class="thank-you-cta" data-slot="cta-text" href="#">Continue the conversation</a>
  </div>
  <div class="thank-you-footer">
    <img class="thank-you-footer-logo" data-slot="logo" src="../assets/slalom-logo-white.svg" alt="Slalom">
    <span data-slot="footer-meta">Fiercely Human Consulting</span>
  </div>
</div>
</body>
</html>
